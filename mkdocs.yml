site_name: Readwise Reports
site_description: High-signal reading reports from Readwise and Reader
site_url: !ENV [ PUBLIC_SITE_URL, "" ]
repo_url: ""
repo_name: readwise-reports

theme:
  name: material
  custom_dir: overrides
  language: zh
  font: false
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Dark — switch to Sepia
    - scheme: sepia
      primary: custom
      accent: custom
      toggle:
        icon: material/book-open-page-variant
        name: Sepia — switch to Light
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Light — switch to Dark
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.highlight
    - content.code.copy

