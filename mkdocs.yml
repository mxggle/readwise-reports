site_name: Readwise Reports
site_description: High-signal reading reports from Readwise and Reader
site_url: !ENV [PUBLIC_SITE_URL, ""]
repo_url: ""
repo_name: readwise-reports

theme:
  name: material
  language: zh
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.highlight
    - content.code.copy

nav:
  - Dashboard: index.md
  - Readwise:
    - readwise/index.md
    # AUTO_READWISE_START
    - "2026-05-28": readwise/2026-05-28.md
    - "2026-05-27": readwise/2026-05-27.md
    - "2026-05-26": readwise/2026-05-26.md
    - "2026-05-25": readwise/2026-05-25.md
    # AUTO_READWISE_END
  - HN:
    - hn/index.md
    # AUTO_HN_START
    - "2026-05-28": hn/2026-05-28.md
    # AUTO_HN_END
  - Topics:
    - topics/index.md
    - AI: topics/ai.md
    - Programming: topics/programming.md
    - Career: topics/career.md
    - Business: topics/business.md
    - English: topics/english.md
    - Japanese: topics/japanese.md
    - Other: topics/other.md
  - Archive:
    - Weekly: weekly/index.md
    - Monthly: monthly/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
