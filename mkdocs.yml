site_name: Readwise Reports
site_description: High-signal reading reports from Readwise and Reader
site_url: !ENV [ PUBLIC_SITE_URL, "" ]
repo_url: ""
repo_name: readwise-reports

theme:
  name: material
  custom_dir: overrides
  language: zh
  font: false
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Dark — switch to Sepia
    - scheme: sepia
      primary: custom
      accent: custom
      toggle:
        icon: material/book-open-page-variant
        name: Sepia — switch to Light
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Light — switch to Dark
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.highlight
    - content.code.copy

nav:
  - Dashboard: index.md
  - GitHub Trends:
      - github-trends/index.md
      - 2026-06-05: github-trends/2026-06-05.md
      - 2026-06-04: github-trends/2026-06-04.md
      - 2026-06-03: github-trends/2026-06-03.md
      - 2026-06-02: github-trends/2026-06-02.md
      - 2026-06-01: github-trends/2026-06-01.md
      - 2026-05-31: github-trends/2026-05-31.md
  - HackerNews:
      - hn/index.md
      - 2026-06-05: hn/2026-06-05.md
      - 2026-06-04: hn/2026-06-04.md
      - 2026-06-03: hn/2026-06-03.md
      - 2026-06-02: hn/2026-06-02.md
      - 2026-06-01: hn/2026-06-01.md
      - 2026-05-30: hn/2026-05-30.md
      - 2026-05-29: hn/2026-05-29.md
      - 2026-05-28: hn/2026-05-28.md
  - note AI（日本語）:
      - note-com-jp/index.md
      - 2026-06-05: note-com-jp/2026-06-05.md
      - 2026-06-04: note-com-jp/2026-06-04.md
      - 2026-06-03: note-com-jp/2026-06-03.md
      - 2026-06-02: note-com-jp/2026-06-02.md
      - 2026-06-01: note-com-jp/2026-06-01.md
      - 2026-05-31: note-com-jp/2026-05-31.md
  - Readwise:
      - readwise/index.md
      - 2026-06-05: readwise/2026-06-05.md
      - 2026-06-04: readwise/2026-06-04.md
      - 2026-06-03: readwise/2026-06-03.md
      - 2026-06-02: readwise/2026-06-02.md
      - 2026-06-01: readwise/2026-06-01.md
      - 2026-05-30: readwise/2026-05-30.md
      - 2026-05-29: readwise/2026-05-29.md
      - 2026-05-28: readwise/2026-05-28.md
      - 2026-05-27: readwise/2026-05-27.md
      - 2026-05-26: readwise/2026-05-26.md
      - 2026-05-25: readwise/2026-05-25.md
  - Topics:
      - topics/index.md
      - AI: topics/ai.md
      - Programming: topics/programming.md
      - Career: topics/career.md
      - Business: topics/business.md
      - English: topics/english.md
      - Japanese: topics/japanese.md
      - Other: topics/other.md
  - Archive:
      - Weekly: weekly/index.md
      - Monthly: monthly/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji ""
      emoji_generator:

        !!python/name:material.extensions.emoji.to_svg ""
plugins:
  - search

extra_css:
  - stylesheets/extra.css
